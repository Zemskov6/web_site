<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Список самых высоких зданий</title>
  <link rel="stylesheet" href="CSS/style.css">
  <script src="d3.v7.min.js"></script>
  <script src="JavaScript/data.js"></script>
  <script src="JavaScript/table.js"></script>
  <script src="JavaScript/chart.js"></script>
  <script src="JavaScript/main.js"></script>
</head>
<body>
  <h3>Список самых высоких зданий</h3>

  <form id="settings-form" class="settings-form">
    <div class="form-group">
      <p>Значение по оси OX</p>
      <label><input type="radio" name="ox" value="Страна" checked> Страна</label>
      <label><input type="radio" name="ox" value="Год"> Год</label>
    </div>

    <div class="form-group" id="oy-group">
      <p>Значение по оси OY</p>
      <label><input type="checkbox" name="oy" value="max" checked> Максимальная высота</label>
      <label><input type="checkbox" name="oy" value="min"> Минимальная высота</label>
    </div>
    <div id="oy-error" class="error-message"></div>

    <div class="form-group">
      <p>Тип диаграммы
        <select name="chartType">
          <option value="scatter" selected>Точечная</option>
          <option value="bar">Гистограмма</option>
        </select>
      </p>
    </div>

    <button type="button" id="buildChartBtn">Построить график</button>
  </form>

  <svg></svg>
  <br></br>
  <button id="toggle-table" type="button">Скрыть таблицу</button>
  <br></br>
  <table id="build"> 
  </table>
</body>
</html>
