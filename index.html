
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="CSS/style.css">
	<script src="JavaScript/main.js"></script>
	<script src="JavaScript/image.js"></script>
	<script src="JavaScript/path.js"></script>
  <script src="d3.v7.min.js"></script>
</head>
<body>
  <form id="form">
  <label>Длительность (мс):</label><input type="number" id="duration" value="5000" min="500"><br>
	<label>Масштаб от:</label><input type="number" id="minScale" value="0.5" min="0.1" max="2" step="0.1"><br>
	<label>Масштаб до:</label><input type="number" id="maxScale" value="1" min="0.1" max="2" step="0.1"><br>
  <label>Вращение:</label><input type="number" id="rotation" value="90"><br>
  <button type="button" id="btn-start">Запустить</button>
  <button type="button" id="btn-clear">Очистить</button>
</form>
  <svg id="svg"></svg>
</body>
</html>
